<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Publication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,500;7..72,600;7..72,700&family=Public+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell article-shell">
      <header class="site-header article-header">
        <a class="brand" href="index.html">
          <span class="brand-mark">A</span>
          <span>Back to Home</span>
        </a>
        <button class="button theme-toggle" type="button" aria-label="Toggle color theme">
          <span class="theme-toggle-icon" aria-hidden="true"></span>
        </button>
      </header>

      <main class="article-page">
        <section class="article-page-hero">
          <p class="eyebrow">Publication</p>
          <h1 id="article-title"></h1>
          <p class="article-meta" id="article-meta"></p>
          <p class="article-takeaway" id="article-takeaway"></p>
          <div class="hero-actions" id="article-actions"></div>
        </section>

        <section class="section article-abstract-section">
          <article class="article-abstract-card">
            <p class="eyebrow">Abstract</p>
            <p id="article-abstract"></p>
          </article>
        </section>

        <section class="section article-visual-section">
          <div id="article-visuals" class="article-visuals"></div>
        </section>
      </main>
    </div>

    <dialog class="citation-modal" id="citation-modal">
      <div class="citation-inner">
        <div class="citation-topbar">
          <button class="button" id="citation-copy" type="button">Copy BibTeX</button>
          <button class="button" id="citation-close" type="button">Close</button>
        </div>
        <p class="eyebrow">BibTeX</p>
        <h2 id="citation-title"></h2>
        <pre id="citation-code"></pre>
      </div>
    </dialog>

    <script src="site-data.js"></script>
    <script src="theme.js"></script>
    <script src="article.js"></script>
  </body>
</html>
