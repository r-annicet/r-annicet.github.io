<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Portfolio</title>
    <meta name="description" content="Research website for Annicet Razafindratovolahy." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,500;7..72,600;7..72,700&family=Public+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="#top" aria-label="Homepage">
          <span class="brand-mark">A</span>
          <span id="brand-name"></span>
        </a>
        <nav class="site-nav" id="site-nav"></nav>
      </header>

      <main id="top">
        <section class="hero">
          <div class="hero-main">
            <p class="eyebrow" id="hero-role"></p>
            <h1 id="hero-name"></h1>
            <p class="hero-summary" id="hero-summary"></p>
            <div class="hero-actions" id="hero-actions"></div>
          </div>
          <aside class="hero-side">
            <div class="hero-note">
              <p class="eyebrow">Affiliation</p>
              <p id="hero-affiliation"></p>
            </div>
            <div class="stats-grid" id="stats-grid"></div>
          </aside>
        </section>

        <section class="section" id="about">
          <div class="section-heading">
            <p class="eyebrow">About</p>
            <h2>Research profile</h2>
          </div>
          <div class="about-layout">
            <div class="about-copy" id="about-copy"></div>
            <div class="keyword-box">
              <p class="eyebrow">Focus</p>
              <div class="keyword-list" id="keyword-list"></div>
            </div>
          </div>
        </section>

        <section class="section" id="publications">
          <div class="section-heading">
            <p class="eyebrow">Publications</p>
            <h2>Selected publications</h2>
          </div>
          <div class="publication-grid" id="publication-grid"></div>
          <div class="section-actions">
            <a class="button" href="publications.html">Show all publications</a>
          </div>
        </section>

        <section class="section" id="experience">
          <div class="section-heading">
            <p class="eyebrow">Experience</p>
            <h2>Academic and professional background</h2>
          </div>
          <div class="experience-grid">
            <article class="info-card">
              <h3>Education</h3>
              <div class="info-list" id="education-list"></div>
            </article>
            <article class="info-card">
              <h3>Research</h3>
              <div class="info-list" id="research-list"></div>
            </article>
            <article class="info-card">
              <h3>Professional</h3>
              <div class="info-list" id="professional-list"></div>
            </article>
            <article class="info-card">
              <h3>Leadership & Honors</h3>
              <div class="info-list" id="leadership-list"></div>
            </article>
          </div>
        </section>

        <section class="section contact-section" id="contact">
          <div class="contact-panel">
            <div>
              <p class="eyebrow">Contact</p>
              <h2>Get in touch</h2>
              <p id="contact-text"></p>
            </div>
            <div class="hero-actions" id="contact-actions"></div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <p id="footer-text"></p>
      </footer>
    </div>

    <dialog class="citation-modal" id="citation-modal">
      <div class="citation-inner">
        <div class="citation-topbar">
          <button class="button" id="citation-copy" type="button">Copy BibTeX</button>
          <button class="button" id="citation-close" type="button">Close</button>
        </div>
        <p class="eyebrow">BibTeX</p>
        <h2 id="citation-title"></h2>
        <pre id="citation-code"></pre>
      </div>
    </dialog>

    <script src="site-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
