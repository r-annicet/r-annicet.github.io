<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,500;7..72,600;7..72,700&family=Public+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell article-shell">
      <header class="site-header article-header">
        <a class="brand" href="index.html">
          <span class="brand-mark">A</span>
          <span>Back to Home</span>
        </a>
        <button class="button theme-toggle" type="button" aria-label="Toggle color theme">
          <span class="theme-toggle-icon" aria-hidden="true"></span>
        </button>
      </header>

      <main class="viewer-page">
        <section class="article-page-hero">
          <p class="eyebrow">PDF</p>
          <h1 id="viewer-title"></h1>
        </section>
        <section class="section pdf-section">
          <iframe id="pdf-frame" class="pdf-frame" title="PDF viewer"></iframe>
          <p class="pdf-fallback">
            If the embedded preview is blocked by your browser, use
            <a id="pdf-direct-link" href="#">this direct PDF link</a>.
          </p>
        </section>
      </main>
    </div>

    <script src="theme.js"></script>
    <script src="viewer.js"></script>
  </body>
</html>
