<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell viewer-shell">
      <header class="site-header article-header">
        <a class="brand" href="index.html">
          <span class="brand-mark">A</span>
          <span>Back to Home</span>
        </a>
        <div class="viewer-controls">
          <button class="button" id="zoom-out" type="button">-</button>
          <span id="viewer-title"></span>
          <button class="button" id="zoom-in" type="button">+</button>
        </div>
      </header>
      <main class="viewer-page">
        <div class="pdf-canvas-list" id="pdf-canvas-list"></div>
      </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.min.js"></script>
    <script src="viewer.js"></script>
  </body>
</html>
